# Exercises the installer paths that can't be tested on a developer box that already has
# everything installed: fresh Ubuntu (apt/PGDG, systemd) and fresh macOS (brew-native).
name: install
# No path filter: the installer's verify step runs the full offline suite, so any code
# change can affect it — and the matrix doubles as cross-platform CI for the whole repo.
on:
  push:
  schedule:
    - cron: "0 4 * * 1" # weekly: catch PGDG/brew/ollama upstream drift
  workflow_dispatch:

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Runners ship Docker; test BOTH paths: native (apt/PGDG) and docker.
      # Unprivileged on purpose: exercises the lazy `sudo -n` resolution path.
      - name: install (native PG16 via PGDG, no ollama)
        run: |
          bash scripts/install.sh --native --no-ollama --with-demo | tee out.log
          grep -q '^status: degraded$' out.log
      - name: re-run is idempotent
        run: |
          bash scripts/install.sh --native --no-ollama | tee rerun.log
          grep -q '^status: degraded$' rerun.log

  linux-docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install (docker pg16) + real embed-model pull
        # Pull only the small model (~270MB) — same code path as the 4.7GB one.
        run: |
          MINIME_PULL_MODELS=nomic-embed-text bash scripts/install.sh --with-demo | tee out.log
          grep -Eq '^status: (ok|degraded)$' out.log

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # macOS runners have brew but no Docker daemon -> exercises the brew-native branch.
      - name: install (brew-native PG17, no ollama)
        run: |
          bash scripts/install.sh --no-ollama --with-demo | tee out.log
          grep -q '^status: degraded$' out.log
      # The m8 CJK FTS tests fail ONLY on this runner (pass on Linux CI and dev macs);
      # the summary log hides the assertion detail. Dump the cluster facts + the exact
      # failing queries so the next failure is diagnosable from the log alone.
      - name: diagnose CJK FTS (on failure)
        if: failure()
        run: |
          PGB="$(brew --prefix postgresql@17 2>/dev/null)/bin"
          [ -x "$PGB/psql" ] || PGB="$(dirname "$(command -v psql)")"
          for db in minime_test minime; do
            echo "=== $db ==="
            "$PGB/psql" -h localhost -d "$db" \
              -c "select version()" \
              -c "select datname, pg_encoding_to_char(encoding) enc, datcollate, datctype from pg_database" \
              -c "show default_text_search_config" \
              -c "select cjk_fold('招商银行') as fold" \
              -c "select to_tsvector('english', cjk_fold('腊肠只买牛车水那家老铺的')) as tsv" \
              -c "select websearch_to_tsquery('english', '腊肠 OR 哪里 OR 牛车') as tsq" \
              -c "select count(*) total, count(*) filter (where tsv @@ websearch_to_tsquery('english','腊肠')) hits from chunks" \
              || true
          done
